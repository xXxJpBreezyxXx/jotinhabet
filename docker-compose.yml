# JotinhaBet — stack de produção (Traefik + Portainer)
#
# Roteamento no MESMO domínio (jotinhabet.eurekmind.com):
#   - /api/*  -> backend (Express :4000)      [prioridade alta]
#   - /*      -> frontend (nginx :80, SPA)     [prioridade baixa]
# Assim as chamadas relativas "/api/..." do front funcionam sem CORS (mesma origem).
#
# Rede: RedeEurek (mesma de todas as stacks da VPS — Traefik e Supabase inclusos).
#
# >>> AJUSTE ANTES DE SUBIR <<<
#   1. `entrypoints=websecure`   -> nome do seu entrypoint HTTPS no Traefik
#   2. `certresolver=letsencrypt` -> nome do seu certResolver no Traefik
#   3. basicAuth: gere o hash e cole na label `...basicauth.users` (duplicando $ -> $$)
#   4. Coloque `backend/.env` na VPS (NÃO versione) e `backend/sureradar.json` (cookies).

services:
  jotinhabet-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jotinhabet-backend:latest
    container_name: jotinhabet-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
      - PORT=4000
      - FRONTEND_ORIGIN=https://jotinhabet.eurekmind.com
      - SURERADAR_COOKIES_PATH=/app/sureradar.json
    volumes:
      - ./backend/sureradar.json:/app/sureradar.json:ro   # cookies do SureRadar (coloque na VPS)
      - jotinhabet_logs:/app/logs                          # persiste scanner.log / sent_alerts.json
    networks:
      - RedeEurek
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=RedeEurek"
      - "traefik.http.routers.jotinhabet-api.rule=Host(`jotinhabet.eurekmind.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.jotinhabet-api.entrypoints=websecure"
      - "traefik.http.routers.jotinhabet-api.tls=true"
      - "traefik.http.routers.jotinhabet-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jotinhabet-api.priority=100"
      - "traefik.http.routers.jotinhabet-api.middlewares=jotinhabet-auth"
      - "traefik.http.services.jotinhabet-api.loadbalancer.server.port=4000"
      # --- Autenticação de borda (protege TODO o app + as rotas de IA/billing) ---
      # Gere o hash:  htpasswd -nbB seu_usuario 'sua_senha'   (ou: openssl passwd -apr1 'sua_senha')
      # Cole aqui e DUPLIQUE cada "$" -> "$$" (senão o compose interpola).
      # Com essa auth ligada, deixe API_TOKEN vazio/placeholder no .env (a borda já é o portão).
      # (Se você já usa Authelia/Authentik no Traefik, troque por aquele middleware.)
      - "traefik.http.middlewares.jotinhabet-auth.basicauth.users=CHANGE_ME:$$apr1$$TROQUE$$ESTE$$HASH"

  jotinhabet-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: jotinhabet-frontend:latest
    container_name: jotinhabet-frontend
    restart: unless-stopped
    depends_on:
      - jotinhabet-backend
    networks:
      - RedeEurek
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=RedeEurek"
      - "traefik.http.routers.jotinhabet-web.rule=Host(`jotinhabet.eurekmind.com`)"
      - "traefik.http.routers.jotinhabet-web.entrypoints=websecure"
      - "traefik.http.routers.jotinhabet-web.tls=true"
      - "traefik.http.routers.jotinhabet-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jotinhabet-web.priority=1"
      - "traefik.http.routers.jotinhabet-web.middlewares=jotinhabet-auth"
      - "traefik.http.services.jotinhabet-web.loadbalancer.server.port=80"

volumes:
  jotinhabet_logs:

networks:
  RedeEurek:
    external: true
    name: RedeEurek
