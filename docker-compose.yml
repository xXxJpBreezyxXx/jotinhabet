# JotinhaBet — stack para DOCKER SWARM (Traefik em swarm mode + Portainer)
#
# IMPORTANTE (Swarm):
#  - `docker stack deploy` IGNORA `build:` → é preciso BUILDAR as imagens ANTES.
#  - Traefik em swarm mode lê os labels de `deploy.labels` (NÃO dos labels do container).
#  - Rede RedeEurek é overlay externa (a mesma das outras stacks).
#
# DEPLOY (single-node swarm), a partir da raiz do projeto:
#   docker compose build                                     # builda as imagens (usa build: + image:)
#   docker stack deploy -c docker-compose.yml jotinhabet     # sobe como serviços do swarm
#
# >>> AJUSTE ANTES <<< entrypoint HTTPS / certresolver do seu Traefik; e coloque
#     backend/.env e backend/sureradar.json na VPS.

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jotinhabet-backend:latest
    env_file:
      - ./backend/.env
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
      - PORT=4000
      - FRONTEND_ORIGIN=https://jotinhabet.eurekmind.com
      - SURERADAR_COOKIES_PATH=/app/sureradar.json
    volumes:
      - ./backend/sureradar.json:/app/sureradar.json:ro   # cookies do SureRadar (na VPS)
      - jotinhabet_logs:/app/logs
    networks:
      - RedeEurek
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=RedeEurek"
        - "traefik.http.routers.jotinhabet-api.rule=Host(`jotinhabet.eurekmind.com`) && PathPrefix(`/api`)"
        - "traefik.http.routers.jotinhabet-api.entrypoints=websecure"
        - "traefik.http.routers.jotinhabet-api.tls=true"
        - "traefik.http.routers.jotinhabet-api.tls.certresolver=letsencrypt"
        - "traefik.http.routers.jotinhabet-api.priority=100"
        - "traefik.http.services.jotinhabet-api.loadbalancer.server.port=4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: jotinhabet-frontend:latest
    networks:
      - RedeEurek
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=RedeEurek"
        - "traefik.http.routers.jotinhabet-web.rule=Host(`jotinhabet.eurekmind.com`)"
        - "traefik.http.routers.jotinhabet-web.entrypoints=websecure"
        - "traefik.http.routers.jotinhabet-web.tls=true"
        - "traefik.http.routers.jotinhabet-web.tls.certresolver=letsencrypt"
        - "traefik.http.routers.jotinhabet-web.priority=1"
        - "traefik.http.services.jotinhabet-web.loadbalancer.server.port=80"

volumes:
  jotinhabet_logs:

networks:
  RedeEurek:
    external: true
    name: RedeEurek
